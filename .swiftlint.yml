# SwiftLint configuration for Prey iOS
# https://github.com/realm/SwiftLint

# ─── Paths ───────────────────────────────────────────────
excluded:
  - Prey/Swifter           # Third-party library
  - Pods
  - Carthage
  - DerivedData
  - build
  - "*.generated.swift"

# ─── Enabled opt-in rules ────────────────────────────────
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

# ─── Disabled rules ──────────────────────────────────────
# Relaxed to avoid overwhelming warnings on existing code
disabled_rules:
  - trailing_whitespace        # Too noisy on legacy code
  - todo                       # Allow TODO/FIXME comments
  - nesting                    # Project uses nested types
  - type_name                  # Some short type names exist

# ─── Rule configuration ─────────────────────────────────
line_length:
  warning: 150
  error: 250
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1200

type_body_length:
  warning: 400
  error: 800

function_body_length:
  warning: 60
  error: 120

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 3
  error: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - j
    - k
    - x
    - y
    - id
    - ok
    - vc
    - ip
    - to

force_cast: warning
force_try: warning
force_unwrapping: warning

vertical_whitespace:
  max_empty_lines: 2

# ─── Reporter ────────────────────────────────────────────
reporter: "xcode"
