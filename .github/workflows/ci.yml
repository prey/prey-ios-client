name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Ensure iOS platform installed
        run: |
          if ! xcodebuild -showsdks | grep -q iphoneos; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Show SDKs
        run: |
          xcodebuild -showsdks

      - name: Create stub Info.plist for LocationPushService (CI only)
        run: |
          if [ ! -f LocationPushService/Info.plist ]; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>CFBundleDisplayName</key>' \
              '  <string>Prey Location Service</string>' \
              '  <key>CFBundleIdentifier</key>' \
              '  <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>' \
              '  <key>CFBundleName</key>' \
              '  <string>$(PRODUCT_NAME)</string>' \
              '  <key>CFBundlePackageType</key>' \
              '  <string>XPC!</string>' \
              '  <key>NSExtension</key>' \
              '  <dict>' \
              '    <key>NSExtensionPointIdentifier</key>' \
              '    <string>com.apple.location.push.service</string>' \
              '    <key>NSExtensionPrincipalClass</key>' \
              '    <string>$(PRODUCT_MODULE_NAME).LocationPushService</string>' \
              '  </dict>' \
              '  <key>CFBundleShortVersionString</key>' \
              '  <string>1.0</string>' \
              '  <key>CFBundleVersion</key>' \
              '  <string>1</string>' \
              '</dict>' \
              '</plist>' \
              > LocationPushService/Info.plist
          fi

      - name: Build and test
        run: |
          set -o pipefail
          DEVICE_UDID=$(xcrun simctl list devices available | awk '
            /-- iOS [0-9]+/ { ios=1; next }
            /--/ { ios=0 }
            ios && /iPhone/ {
              if (match($0, /[A-F0-9-]{36}/)) {
                print substr($0, RSTART, RLENGTH);
                exit
              }
            }
          ')
          if [ -z "$DEVICE_UDID" ]; then
            echo "No available iOS simulator devices found."
            exit 1
          fi
          DESTINATION="platform=iOS Simulator,id=$DEVICE_UDID"
          xcodebuild \
            -workspace Prey.xcworkspace \
            -scheme Prey \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS= \
            test
